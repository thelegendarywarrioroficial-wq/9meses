<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros 9 Meses Juntos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030108;
            overflow: hidden;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #canvasContainer {
            position: relative;
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #0d0124 0%, #17022b 40%, #050010 100%);
        }

        #intro-screen {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            top: 45%;
            z-index: 10;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .fade-out {
            opacity: 0 !important;
            transform: scale(1.05);
            pointer-events: none;
        }

        audio {
            display: none;
        }
    </style>
</head>

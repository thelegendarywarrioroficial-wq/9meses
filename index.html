<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros 9 Meses Juntos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030108;
            overflow: hidden;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #canvasContainer {
            position: relative;
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #0d0124 0%, #17022b 40%, #050010 100%);
        }

        #intro-screen {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            top: 45%;
            z-index: 10;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .fade-out {
            opacity: 0 !important;
            transform: scale(1.05);
            pointer-events: none;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>

<div id="canvasContainer">
    <div id="intro-screen">Toca la pantalla para comenzar...</div>
    <canvas id="gameCanvas" width="900" height="550"></canvas>
</div>

<audio id="background-music" loop preload="auto">
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const introScreen = document.getElementById('intro-screen');
    const music = document.getElementById('background-music');

    let animationStarted = false;
    let walkStarted = false;
    let globalX = 0; 
    let time = 0;
    let lastTime = 0;
    let currentLyricText = ""; 

    // ================= MARCAS DE TIEMPO EXACTAS DE TU LISTA =================
    const lyricsTimeline = [
        // VERSO 1
        { start: 36.0, end: 38.0, text: "Feeling..." },
        { start: 38.0, end: 41.0, text: "More than perfect, amazing." },
        { start: 41.0, end: 45.0, text: "More than words can explain, it's..." },
        { start: 45.0, end: 48.0, text: "Purest form of reality..." },
        { start: 48.0, end: 49.0, text: "Divinity." },
        
        // VERSO 2
        { start: 53.0, end: 55.0, text: "I've been..." },
        { start: 55.0, end: 58.0, text: "Suffering in this tiring..." },
        { start: 58.0, end: 101.0, text: "Crazy world like I'm drowning." },
        { start: 101.0, end: 104.0, text: "There's no way to escape, I thought, but..." },
        { start: 104.0, end: 107.0, text: "Finally, here I am." },
        
        // CORO 1
        { start: 107.0, end: 111.0, text: "I'll never find another love like this, it's true." },
        { start: 111.0, end: 115.0, text: "I'll never find another love like this." },
        { start: 115.0, end: 119.0, text: "Baby, can you feel it too, just like I do?" },
        { start: 119.0, end: 122.0, text: "(Who does paradise belong to?)" },
        { start: 122.0, end: 126.0, text: "I'll never find another love like this, I know." },
        { start: 126.0, end: 129.0, text: "I'll never find another love like this." },
        { start: 129.0, end: 133.0, text: "Baby, can I give it to you? Just like you do?" },
        { start: 133.0, end: 135.0, text: "Then we share it too." },
        
        // POST-CORO 1
        { start: 135.0, end: 137.0, text: "Thank you." },
        { start: 137.0, end: 140.0, text: "Wherever I go, I feel you." },
        { start: 140.0, end: 143.0, text: "Now I know..." },
        { start: 143.0, end: 147.0, text: "That I'll never love like this." },
        
        // VERSO 3
        { start: 153.0, end: 155.0, text: "Sacred..." },
        { start: 155.0, end: 158.0, text: "Sweet divine invitation..." },
        { start: 158.0, end: 161.0, text: "To heal a heart that's been breaking." },
        { start: 161.0, end: 164.0, text: "Mend a soul that's been crying out..." },
        { start: 164.0, end: 166.0, text: "Let me out." },
        
        // VERSO 4
        { start: 170.0, end: 172.0, text: "Now I am..." },
        { start: 172.0, end: 175.0, text: "Falling softly, colliding..." },
        { start: 175.0, end: 178.0, text: "Into your sweet silver lining." },
        { start: 178.0, end: 181.0, text: "There's no way to escape from heaven..." },
        { start: 181.0, end: 184.0, text: "Finally, here we are." },
        
        // CORO 2
        { start: 184.0, end: 188.0, text: "I'll never find another love like this, it's true." },
        { start: 188.0, end: 191.0, text: "I'll never find another love like this." },
        { start: 191.0, end: 195.0, text: "Baby, can you feel it too, just like I do?" },
        { start: 195.0, end: 198.0, text: "(Who does paradise belong to?)" },
        { start: 198.0, end: 202.0, text: "I'll never find another love like this, I know." },
        { start: 202.0, end: 205.0, text: "I'll never find another love like this." },
        { start: 205.0, end: 209.0, text: "Baby, can I give it to you? Just like you do?" },
        { start: 209.0, end: 212.0, text: "Then we share it too." },
        
        // POST-CORO 2
        { start: 212.0, end: 214.0, text: "Thank you." },
        { start: 214.0, end: 217.0, text: "Wherever I go, I feel you." },
        { start: 217.0, end: 220.0, text: "Now I know..." },
        { start: 220.0, end: 224.0, text: "That I'll never love like this." },
        { start: 224.0, end: 227.0, text: "Never love like this." },
        
        // OUTRO
        { start: 227.0, end: 239.5, text: "Love like this... ❤️" }
    ];

    window.addEventListener('click', startExperience, { once: true });
    window.addEventListener('touchstart', startExperience, { once: true });

    function startExperience() {
        music.play().catch(e => console.log("Audio bloqueado"));
        introScreen.innerHTML = "Así comenzó...";
        animationStarted = true;
        
        lastTime = performance.now();
        requestAnimationFrame(animate);

        // Espera 4.5 segundos quieto de la mano antes de avanzar
        setTimeout(() => {
            introScreen.classList.add('fade-out'); 
            walkStarted = true; 
        }, 4500); 
    }

    const groundY = 440;
    // Velocidad perfecta para recorrer el mapa entero en 32 segundos clavados
    const speedPerSecond = 138.75; 

    // --- DISEÑO DE LOS PERSONAJES DE LA PAREJA ---
    const couple = {
        x: 320, 
        y: groundY - 110,
        draw: function(t, isWalking) {
            let bounceA = isWalking ? Math.sin(t * 0.08) * 3 : 0;
            let bounceB = isWalking ? Math.sin(t * 0.08 + Math.PI) * 3 : 0;
            
            ctx.save();
            
            // ÉL (Izquierda)
            let ex = this.x; let ey = this.y + bounceA;
            ctx.fillStyle = '#121214'; ctx.beginPath(); ctx.arc(ex + 20, ey + 20, 16, Math.PI, 0); ctx.lineTo(ex + 38, ey + 32); ctx.lineTo(ex + 2, ey + 32); ctx.fill();
            ctx.fillStyle = '#fcd0ba'; ctx.beginPath(); ctx.arc(ex + 20, ey + 26, 13, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5; ctx.strokeRect(ex + 10, ey + 20, 9, 7); ctx.strokeRect(ex + 22, ey + 20, 9, 7); ctx.beginPath(); ctx.moveTo(ex + 19, ey + 23); ctx.lineTo(ex + 22, ey + 23); ctx.stroke();
            ctx.fillStyle = '#1c2d42'; ctx.beginPath(); ctx.roundRect(ex + 5, ey + 38, 30, 60, [10, 10, 0, 0]); ctx.fill();
            ctx.fillStyle = '#4fc3f7'; ctx.fillRect(ex + 8, ey + 38, 3, 60); ctx.fillRect(ex + 29, ey + 38, 3, 60);
            ctx.fillStyle = '#151518'; ctx.fillRect(ex + 8, ey + 98, 9, 15); ctx.fillRect(ex + 23, ey + 98, 9, 15);

            // ELLA (Derecha)
            let ox = this.x + 55; let oy = this.y + bounceB;
            ctx.fillStyle = '#4a2f1b'; ctx.beginPath(); ctx.roundRect(ox + 2, oy + 8, 36, 65, 12); ctx.fill();
            ctx.fillStyle = '#fde2d4'; ctx.beginPath(); ctx.arc(ox + 20, ey + 26, 13, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#e5a93b'; ctx.lineWidth = 1.8; ctx.beginPath(); ctx.arc(ox + 13, ey + 25, 5, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(ox + 27, ey + 25, 5, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(ox + 18, ey + 25); ctx.lineTo(ox + 22, ey + 25); ctx.stroke();
            ctx.fillStyle = '#eadecc'; ctx.beginPath(); ctx.roundRect(ox + 4, oy + 38, 32, 60, [8, 8, 0, 0]); ctx.fill();
            ctx.fillStyle = '#ffffff'; ctx.fillRect(ox + 4, oy + 48, 32, 4); ctx.fillRect(ox + 4, oy + 62, 32, 4); ctx.fillRect(ox + 4, oy + 76, 32, 4);
            ctx.fillStyle = '#222'; ctx.fillRect(ox + 8, oy + 98, 8, 15); ctx.fillRect(ox + 24, oy + 98, 8, 15);

            // MANOS AGARRADAS
            ctx.strokeStyle = '#1c2d42'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(ex + 30, ey + 60); ctx.lineTo(ex + 45, ey + 75); ctx.stroke();
            ctx.strokeStyle = '#eadecc'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(ox + 8, oy + 60); ctx.lineTo(ox - 2, oy + 75); ctx.stroke();
            ctx.fillStyle = '#fcd0ba'; ctx.beginPath(); ctx.arc(ex + 41, ((ey + oy)/2) + 74, 5, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }
    };

    // --- ELEMENTOS DEL ESCENARIO ---
    function drawChat(x, y) {
        ctx.save(); ctx.shadowColor = 'rgba(29, 161, 242, 0.2)'; ctx.shadowBlur = 10; ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.roundRect(x, y, 180, 110, 12); ctx.fill(); ctx.fillStyle = '#1da1f2'; ctx.beginPath(); ctx.roundRect(x, y, 180, 25, [12, 12, 0, 0]); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = '#e3f2fd'; ctx.beginPath(); ctx.roundRect(x + 12, y + 38, 100, 26, 8); ctx.fill(); ctx.fillStyle = '#f5f5f5'; ctx.beginPath(); ctx.roundRect(x + 68, y + 72, 100, 26, 8); ctx.fill(); ctx.fillStyle = '#0d47a1'; ctx.font = '12px sans-serif'; ctx.fillText("¡Hola! 😊", x + 20, y + 55); ctx.fillStyle = '#333333'; ctx.font = '12px sans-serif'; ctx.fillText("¡Holaaa! ✨", x + 76, y + 89); ctx.restore();
    }
    function drawMcDonalds(x, y) {
        ctx.save(); ctx.fillStyle = '#8d0c0c'; ctx.beginPath(); ctx.roundRect(x, y, 180, 130, [10, 10, 0, 0]); ctx.fill(); ctx.fillStyle = 'rgba(20,20,30,0.8)'; ctx.fillRect(x + 45, y + 60, 90, 70); ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(x + 65, y + 45); ctx.bezierCurveTo(x + 73, y + 15, x + 85, y + 15, x + 90, y + 45); ctx.bezierCurveTo(x + 95, y + 15, x + 107, y + 15, x + 115, y + 45); ctx.stroke(); ctx.restore();
    }
    function drawChimuelo(x, y, t) {
        ctx.save(); let floatY = Math.sin(t * 0.06) * 8; let cy = y - 10 + floatY; const dragonColor = '#1a1c23'; const dragonShadow = '#0f1015'; ctx.fillStyle = dragonShadow; ctx.beginPath(); ctx.moveTo(x + 25, cy + 35); ctx.bezierCurveTo(x - 20, cy, x - 10, cy + 40, x + 20, cy + 50); ctx.fill(); ctx.beginPath(); ctx.moveTo(x + 45, cy + 35); ctx.bezierCurveTo(x + 90, cy, x + 80, cy + 40, x + 50, cy + 50); ctx.fill(); ctx.fillStyle = dragonColor; ctx.beginPath(); ctx.ellipse(x + 35, cy + 45, 20, 25, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = dragonShadow; ctx.beginPath(); ctx.ellipse(x + 23, cy + 65, 6, 12, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(x + 47, cy + 65, 6, 12, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = dragonColor; ctx.beginPath(); ctx.moveTo(x + 15, cy + 10); ctx.bezierCurveTo(x - 15, cy - 25, x - 5, cy - 15, x + 22, cy); ctx.fill(); ctx.beginPath(); ctx.moveTo(x + 55, cy + 10); ctx.bezierCurveTo(x + 85, cy - 25, x + 75, cy - 15, x + 48, cy); ctx.fill(); ctx.beginPath(); ctx.moveTo(x + 10, cy + 18); ctx.lineTo(x - 5, cy + 12); ctx.lineTo(x + 12, cy + 24); ctx.moveTo(x + 60, cy + 18); ctx.lineTo(x + 75, cy + 12); ctx.lineTo(x + 58, cy + 24); ctx.fill(); ctx.beginPath(); ctx.ellipse(x + 35, cy + 18, 28, 20, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#a6ff00'; ctx.save(); ctx.translate(x + 21, cy + 16); ctx.rotate(-Math.PI / 10); ctx.beginPath(); ctx.ellipse(0, 0, 9, 12, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#0a0d10'; ctx.beginPath(); ctx.ellipse(0, 0, 2.5, 11, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(-3, -4, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); ctx.save(); ctx.translate(x + 49, cy + 16); ctx.rotate(Math.PI / 10); ctx.fillStyle = '#a6ff00'; ctx.beginPath(); ctx.ellipse(0, 0, 9, 12, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#0a0d10'; ctx.beginPath(); ctx.ellipse(0, 0, 2.5, 11, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(-3, -4, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); ctx.strokeStyle = dragonShadow; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.beginPath(); ctx.arc(x + 35, cy + 24, 8, 0.1, Math.PI - 0.1); ctx.stroke(); ctx.restore();
    }
    function drawGerberas(x, y) {
        ctx.save(); const colors = ['#e91e63', '#ffeb3b', '#ff5722', '#ff85a2']; for(let i = 0; i < 4; i++) { let gx = x + (i * 42); let gy = y + (i % 2 * 18); ctx.strokeStyle = '#2e7d32'; ctx.lineWidth = 3.5; ctx.beginPath(); ctx.moveTo(gx, gy); ctx.quadraticCurveTo(gx - 5, gy + 30, gx, gy + 75); ctx.stroke(); ctx.fillStyle = colors[i]; for(let j = 0; j < 12; j++) { ctx.beginPath(); ctx.ellipse(gx, gy, 6, 18, (j * Math.PI) / 6, 0, Math.PI * 2); ctx.fill(); } ctx.fillStyle = '#4e342e'; ctx.beginPath(); ctx.arc(gx, gy, 8, 0, Math.PI*2); ctx.fill(); } ctx.restore();
    }
    function drawCar(x, y) {
        ctx.save(); ctx.fillStyle = '#1565c0'; ctx.beginPath(); ctx.roundRect(x, y, 130, 40, 8); ctx.fill(); ctx.fillStyle = '#64b5f6'; ctx.beginPath(); ctx.roundRect(x + 25, y - 22, 75, 25, [15, 15, 0, 0]); ctx.fill(); ctx.fillStyle = '#212121'; ctx.beginPath(); ctx.arc(x + 30, y + 38, 14, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 100, y + 38, 14, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#cfd8dc'; ctx.beginPath(); ctx.arc(x + 30, y + 38, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 100, y + 38, 6, 0, Math.PI*2); ctx.fill(); ctx.ffffff = '#ffffff'; ctx.beginPath(); ctx.roundRect(x + 35, y - 60, 60, 24, 4); ctx.fill(); ctx.strokeStyle = '#e91e63'; ctx.lineWidth = 2; ctx.strokeRect(x + 35, y - 60, 60, 24); ctx.fillStyle = '#e91e63'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.fillText("CDMX 📍", x + 65, y - 44); ctx.restore();
    }
    
    // --- FONDO ANIMADO ---
    let stars = []; let shootingStars = [];
    for(let i=0; i<80; i++) { stars.push({x: Math.random()*canvas.width, y: Math.random()*380, r: Math.random()*2+0.8, op: Math.random()}); }

    function drawSpecialBackground() {
        let moonGrad = ctx.createRadialGradient(730, 140, 10, 730, 140, 70); moonGrad.addColorStop(0, '#fffde7'); moonGrad.addColorStop(0.2, '#fff9c4'); moonGrad.addColorStop(1, 'rgba(23, 2, 43, 0)'); ctx.fillStyle = moonGrad; ctx.beginPath(); ctx.arc(730, 140, 70, 0, Math.PI*2); ctx.fill();
        let nebula = ctx.createRadialGradient(250, 180, 50, 250, 180, 280); nebula.addColorStop(0, 'rgba(233, 30, 99, 0.08)'); nebula.addColorStop(0.5, 'rgba(147, 112, 219, 0.04)'); nebula.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = nebula; ctx.fillRect(0, 0, canvas.width, 400);
        stars.forEach(s => { s.op += (Math.random() - 0.5) * 0.04; if(s.op < 0.2) s.op = 0.2; if(s.op > 1) s.op = 1; ctx.fillStyle = `rgba(255, 255, 255, ${s.op})`; ctx.fillRect(s.x, s.y, s.r, s.r); });
        if(Math.random() < 0.015) { shootingStars.push({x: Math.random()*(canvas.width - 200), y: 0, len: Math.random()*50+30, speed: Math.random()*4+4}); }
        shootingStars.forEach((ss, idx) => { ss.x += ss.speed; ss.y += ss.speed * 0.7; ctx.strokeStyle = 'rgba(255, 105, 180, 0.4)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(ss.x, ss.y); ctx.lineTo(ss.x - ss.len, ss.y - ss.len*0.7); ctx.stroke(); if(ss.y > canvas.height) shootingStars.splice(idx, 1); });
    }

    // --- BUCLE PRINCIPAL ---
    function animate(timestamp) {
        if (!animationStarted) return; 

        let dt = (timestamp - lastTime) / 1000; 
        lastTime = timestamp;
        if (dt > 0.1) dt = 0.1; 
        time += dt * 60; 

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawSpecialBackground();

        ctx.fillStyle = '#0a0518'; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

        if (walkStarted) {
            globalX += speedPerSecond * dt;
        }

        let chatPos = 950 - globalX;
        let mcPos = 1800 - globalX;
        let chimueloPos = 2650 - globalX;
        let gerberasPos = 3500 - globalX;
        let carPos = 4350 - globalX;
        let finalPos = 4850 - globalX; 

        if(chatPos > -250 && chatPos < 950) drawChat(chatPos, 230);
        if(mcPos > -250 && mcPos < 950) drawMcDonalds(mcPos, groundY - 130);
        if(chimueloPos > -250 && chimueloPos < 950) drawChimuelo(chimueloPos, groundY - 100, time);
        if(gerberasPos > -250 && gerberasPos < 950) drawGerberas(gerberasPos, groundY - 75);
        if(carPos > -250 && carPos < 950) drawCar(carPos, groundY - 40);

        // CONTROL EXACTO DE RENDER
        if (finalPos > 410) {
            couple.draw(time, walkStarted); // Se dibuja perfecto y camina
        } else {
            // Llegamos al destino final (Segundo 36.5 globales, segundo 36.0 de la canción)
            couple.x = 410;
            couple.draw(0, false); 
            
            let heartScale = 1 + Math.sin(time * 0.1) * 0.08;
            ctx.save(); ctx.translate(457, groundY - 130); ctx.scale(heartScale, heartScale);
            ctx.fillStyle = '#ff1744'; ctx.font = '34px Arial'; ctx.textAlign = 'center';
            ctx.fillText("❤️", 0, 0); ctx.restore();

            ctx.fillStyle = '#ffffff'; ctx.font = '300 24px "Montserrat", sans-serif'; ctx.textAlign = 'center';
            ctx.fillText("Te amo", canvas.width / 2, 60);
            ctx.fillStyle = '#ff4081'; ctx.font = 'bold 30px "Montserrat", sans-serif';
            ctx.shadowColor = 'rgba(255, 64, 129, 0.4)'; ctx.shadowBlur = 10;
            ctx.fillText("✨ Felices 9 Meses ✨", canvas.width / 2, 110);
            ctx.restore();

            // SENSOR DE SUBTÍTULOS INTEGRADOS POR TIEMPO REAL DESDE EL REPRODUCTOR
            let currentTime = music.currentTime; 
            currentLyricText = ""; 

            for (let i = 0; i < lyricsTimeline.length; i++) {
                if (currentTime >= lyricsTimeline[i].start && currentTime <= lyricsTimeline[i].end) {
                    currentLyricText = lyricsTimeline[i].text;
                    break;
                }
            }

            if (currentLyricText !== "") {
                ctx.save();
                ctx.textAlign = 'center';
                ctx.font = 'italic 500 17px "Montserrat", sans-serif';
                
                if(currentLyricText.includes("love like this") || currentLyricText.includes("Love like this") || currentLyricText.includes("divinity")) {
                    ctx.fillStyle = '#ff4081';
                    ctx.shadowColor = 'rgba(255, 64, 129, 0.5)'; ctx.shadowBlur = 8;
                } else {
                    ctx.fillStyle = '#ffffff';
                }
                
                ctx.fillText(currentLyricText, canvas.width / 2, 220);
                ctx.restore();
            }
        }

        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
